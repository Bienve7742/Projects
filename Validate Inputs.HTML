<!DOCTYPE html>
<html>

<head>
</head>

<body>

    <h3>Login Verification</h3>
    <p>Age must be 18 and older</p>

    <form id="myForm">
        Name: <input type="text" name="fname" required>
        <br><br>

        Age: <input type="text" name="fage" required>
        <br><br>

        <button type="submit">Submit</button>
    </form>

    <p id="message" style="color:red;"></p>
    <script>
        const form = document.forms["myForm"];
        const message = document.getElementById("message");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            var name = document.forms["myForm"]["fname"].value;
            var age = parseInt(document.forms["myForm"]["fage"].value);

            if (name == "") {
                alert("Name must be filled out");
                return false;
            }

            if (isNaN(age)) {
                alert("Age must be a valid number");
                return false;
            }

            if (age < 18) {
                alert("You must be 18 years or older to login");
                return false;
            }

            message.style.color = "green";
            message.textContent = "Form is valid, Welcome " + name + "!";
        });
    </script>
</body>

</html>
